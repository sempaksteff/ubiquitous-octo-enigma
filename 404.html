<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    padding:20px;
}

.container{
    text-align:center;
    max-width:650px;
    width:100%;
}

.code{
    font-size:140px;
    font-weight:900;
    line-height:1;
    letter-spacing:4px;
    background:linear-gradient(90deg,#38bdf8,#818cf8,#06b6d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

.title{
    font-size:34px;
    margin-top:10px;
    font-weight:bold;
}

.desc{
    margin-top:20px;
    color:#cbd5e1;
    font-size:17px;
    line-height:1.7;
}

.actions{
    margin-top:35px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    padding:14px 28px;
    border-radius:10px;
    margin:8px;
    transition:0.3s;
    font-weight:bold;
}

.home{
    background:#0ea5e9;
    color:white;
}

.home:hover{
    background:#0284c7;
    transform:translateY(-2px);
}

.back{
    background:transparent;
    border:1px solid rgba(255,255,255,0.2);
    color:white;
}

.back:hover{
    background:rgba(255,255,255,0.08);
}

.small{
    margin-top:40px;
    font-size:13px;
    color:#64748b;
}

/* responsive */
@media(max-width:600px){
    .code{
        font-size:90px;
    }
    .title{
        font-size:26px;
    }
    .desc{
        font-size:15px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="code">404</div>

    <div class="title">
        Oops! Page Not Found
    </div>

    <div class="desc">
        The page you are looking for might have been removed, renamed,
        or is temporarily unavailable.
    </div>

    <div class="actions">
        <a href="/" class="btn home">Go Home</a>
        <a href="javascript:history.back()" class="btn back">Go Back</a>
    </div>

    <div class="small">
        Error Code: HTTP 404
    </div>

</div>

</body>
</html>
